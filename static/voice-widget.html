<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .widget {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: #1a1a1a; }
        .subtitle { color: #666; margin-bottom: 32px; font-size: 0.9rem; }
        #call-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        #call-btn:hover { transform: scale(1.05); background: #16a34a; }
        #call-btn:active { transform: scale(0.95); }
        #call-btn.active { background: #ef4444; }
        #call-btn.active:hover { background: #dc2626; }
        #call-btn.connecting { background: #f59e0b; animation: pulse 1.5s infinite; }
        #call-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        #status {
            color: #666;
            font-size: 0.95rem;
            min-height: 24px;
        }
        #status.active { color: #22c55e; font-weight: 600; }
        #status.error { color: #ef4444; }
        .form-row {
            margin-bottom: 16px;
        }
        .form-row select, .form-row input {
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }
        .form-row select:focus, .form-row input:focus { outline: none; border-color: #22c55e; }
        .form-row label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="widget">
        <h1 id="title">AI Assistant</h1>
        <p class="subtitle" id="company-name"></p>

        <div class="form-row">
            <label id="project-label">Project</label>
            <select id="project">
                <option value="" id="project-loading">Loading...</option>
            </select>
        </div>

        <div class="form-row">
            <input type="text" id="identity" placeholder="Your name (optional)">
        </div>

        <div class="form-row">
            <input type="tel" id="phone" placeholder="Phone number (optional, e.g. +1...)">
        </div>

        <div style="display:flex; gap:20px; justify-content:center; margin-bottom:24px;">
            <div style="text-align:center">
                <button id="call-btn" disabled>&#x1F3A4;</button>
                <div style="font-size:0.75rem; color:#999; margin-top:8px;" id="browser-label">Browser</div>
            </div>
            <div style="text-align:center">
                <button id="phone-btn" style="width:120px;height:120px;border-radius:50%;border:none;background:#3b82f6;color:white;font-size:48px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;" disabled>&#x1F4DE;</button>
                <div style="font-size:0.75rem; color:#999; margin-top:8px;" id="phone-label">Phone</div>
            </div>
        </div>

        <div id="status">Initializing...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.18.1/dist/twilio.min.js"></script>
    <script src="/static/voice-widget.js"></script>
</body>
</html>
